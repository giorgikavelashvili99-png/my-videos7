<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Studio - ვიდეო ჰოსტინგის პლატფორმა</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase JS Client (for reading only) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Noto Sans Georgian', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .video-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .video-thumbnail {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #0c2340;
            border: 1px solid #93c5fd;
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 12px;
            background: #f3f4f6;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }
        
        .file-input-label:hover {
            background: #e5e7eb;
            border-color: #667eea;
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-top: 0.5rem;
            display: none;
            z-index: 100;
        }
        
        .dropdown-menu.active {
            display: block;
        }
        
        .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }
        
        .dropdown-menu button:hover {
            background: #f3f4f6;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin: 1rem 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header Navigation -->
    <nav class="glass-effect sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-2">
                    <span class="text-3xl">🌙</span>
                    <h1 class="text-white text-2xl font-bold">Moon Studio</h1>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button id="uploadBtn" class="btn-secondary hidden">+ ვიდეოს ატვირთვა</button>
                    
                    <div class="relative">
                        <button id="adminMenuBtn" class="btn-secondary">
                            ⚙️ ადმინი
                        </button>
                        <div id="adminDropdown" class="dropdown-menu">
                            <button id="adminToggleBtn">🔐 შესვლა</button>
                            <button id="logoutBtn" class="hidden">🚪 გამოსვლა</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center mb-12">
            <h2 class="text-5xl font-bold text-white mb-4">მოგესალმებთ Moon Studio-ში</h2>
            <p class="text-xl text-gray-100">თქვენი პირადი ვიდეო ჰოსტინგის პლატფორმა</p>
        </div>

        <!-- Alerts Container -->
        <div id="alertContainer"></div>

        <!-- Videos Grid -->
        <div class="video-grid" id="videoGrid">
            <div class="flex justify-center items-center col-span-full py-12">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </section>

    <!-- Admin Panel Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">ადმინის პანელი</h3>
            <div id="adminLoginForm">
                <label class="block text-gray-700 font-semibold mb-2">ადმინის პაროლი</label>
                <input type="password" id="adminPassword" placeholder="პარალი შეიყვანეთ" />
                <button id="adminSubmitBtn" class="btn-primary w-full mb-3">შესვლა</button>
                <button id="adminCloseBtn" class="btn-secondary w-full">დახურვა</button>
            </div>
            
            <div id="adminPanel" class="hidden">
                <h4 class="text-xl font-semibold mb-4 text-gray-800">ვიდეოს ატვირთვა</h4>
                
                <div class="file-input-wrapper">
                    <input type="file" id="videoFile" accept="video/*" />
                    <label for="videoFile" class="file-input-label">
                        📁 ფაილის არჩევა
                    </label>
                </div>
                
                <input type="text" id="videoTitle" placeholder="ვიდეოს სახელი" />
                <textarea id="videoDescription" placeholder="ვიდეოს აღწერა" rows="3"></textarea>
                
                <div id="progressContainer" class="hidden">
                    <p class="text-sm text-gray-600 mb-2">ატვირთვის პროგრესი:</p>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>
                
                <button id="uploadVideoBtn" class="btn-primary w-full mb-3">ვიდეოს ატვირთვა</button>
                <button id="adminCloseBtn2" class="btn-secondary w-full">დახურვა</button>
            </div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="videoPlayerModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <button id="closePlayerBtn" class="float-right text-gray-500 hover:text-gray-700 text-2xl">×</button>
            <div style="clear: both;"></div>
            <video id="videoPlayer" controls style="width: 100%; border-radius: 8px; margin-bottom: 1rem;">
                <source src="" type="video/mp4">
                თქვენი ბრაუზერი არ მხარს უჭერს ვიდეო ფაილების დაკვრას.
            </video>
            <h3 id="playerTitle" class="text-2xl font-bold mb-2 text-gray-800"></h3>
            <p id="playerDescription" class="text-gray-600"></p>
        </div>
    </div>

    <!-- Script -->
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        // Update this to your backend URL
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000' 
            : 'https://moonnina2607.onrender.com/'; // Replace with your Render.com backend URL

        const supabaseUrl = 'https://wuyvebiuqtjklqlbmrmes.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1eWViaXVxdGprbHFsYm1ybWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTc5NTcsImV4cCI6MjA5ODM3Mzk1N30.37Z-swkBlmEVfmaJsO3BsCXk2LdHtj1yXWN1oJrYIRw';
        
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        // ============================================
        // STATE MANAGEMENT
        // ============================================
        const state = {
            isAdminLoggedIn: false,
            videos: [],
            currentVideo: null
        };

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const elements = {
            alertContainer: document.getElementById('alertContainer'),
            videoGrid: document.getElementById('videoGrid'),
            adminMenuBtn: document.getElementById('adminMenuBtn'),
            adminDropdown: document.getElementById('adminDropdown'),
            adminToggleBtn: document.getElementById('adminToggleBtn'),
            logoutBtn: document.getElementById('logoutBtn'),
            uploadBtn: document.getElementById('uploadBtn'),
            adminModal: document.getElementById('adminModal'),
            adminLoginForm: document.getElementById('adminLoginForm'),
            adminPanel: document.getElementById('adminPanel'),
            adminPassword: document.getElementById('adminPassword'),
            adminSubmitBtn: document.getElementById('adminSubmitBtn'),
            videoFile: document.getElementById('videoFile'),
            videoTitle: document.getElementById('videoTitle'),
            videoDescription: document.getElementById('videoDescription'),
            uploadVideoBtn: document.getElementById('uploadVideoBtn'),
            progressContainer: document.getElementById('progressContainer'),
            progressFill: document.getElementById('progressFill'),
            videoPlayerModal: document.getElementById('videoPlayerModal'),
            videoPlayer: document.getElementById('videoPlayer'),
            playerTitle: document.getElementById('playerTitle'),
            playerDescription: document.getElementById('playerDescription')
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            elements.alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        function closeAllModals() {
            elements.adminModal.classList.remove('active');
            elements.videoPlayerModal.classList.remove('active');
            elements.adminDropdown.classList.remove('active');
        }

        function toggleAdminPanel() {
            elements.adminLoginForm.classList.toggle('hidden');
            elements.adminPanel.classList.toggle('hidden');
        }

        // ============================================
        // ADMIN AUTHENTICATION
        // ============================================
        function handleAdminClick() {
            if (!state.isAdminLoggedIn) {
                elements.adminModal.classList.add('active');
                elements.adminPassword.focus();
            }
        }

        elements.adminToggleBtn.addEventListener('click', handleAdminClick);
        
        elements.adminSubmitBtn.addEventListener('click', () => {
            const password = elements.adminPassword.value;
            
            if (password === '777') {
                state.isAdminLoggedIn = true;
                showAlert('✅ ადმინ წვდომა მინიჭებულია!', 'success');
                toggleAdminPanel();
                
                elements.adminToggleBtn.classList.add('hidden');
                elements.logoutBtn.classList.remove('hidden');
                elements.uploadBtn.classList.remove('hidden');
                
                elements.adminPassword.value = '';
            } else {
                showAlert('❌ არასწორი პაროლი. წვდომა აკრძალული.', 'error');
                elements.adminPassword.value = '';
            }
        });

        elements.logoutBtn.addEventListener('click', () => {
            state.isAdminLoggedIn = false;
            showAlert('🚪 გამოსვლა წარმატებით', 'info');
            toggleAdminPanel();
            
            elements.adminToggleBtn.classList.remove('hidden');
            elements.logoutBtn.classList.add('hidden');
            elements.uploadBtn.classList.add('hidden');
            elements.adminModal.classList.remove('active');
        });

        document.getElementById('adminCloseBtn').addEventListener('click', closeAllModals);
        document.getElementById('adminCloseBtn2').addEventListener('click', closeAllModals);
        document.getElementById('closePlayerBtn').addEventListener('click', closeAllModals);
        
        elements.adminMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            elements.adminDropdown.classList.toggle('active');
        });

        document.addEventListener('click', (e) => {
            if (!elements.adminMenuBtn.contains(e.target) && !elements.adminDropdown.contains(e.target)) {
                elements.adminDropdown.classList.remove('active');
            }
        });

        // ============================================
        // VIDEO UPLOAD FUNCTIONALITY
        // ============================================
        elements.uploadBtn.addEventListener('click', () => {
            elements.adminModal.classList.add('active');
        });

        elements.videoFile.addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name || 'ფაილი არ არის არჩეული';
            const label = document.querySelector('.file-input-label');
            if (fileName !== 'ფაილი არ არის არჩეული') {
                label.textContent = `✅ ${fileName}`;
            }
        });

        elements.uploadVideoBtn.addEventListener('click', async () => {
            const file = elements.videoFile.files[0];
            const title = elements.videoTitle.value.trim();
            const description = elements.videoDescription.value.trim();

            if (!file) {
                showAlert('⚠️ გთხოვთ აირჩიეთ ვიდეო ფაილი', 'error');
                return;
            }

            if (!title) {
                showAlert('⚠️ გთხოვთ შეიყვანეთ ვიდეოს სახელი', 'error');
                return;
            }

            const maxSize = 500 * 1024 * 1024;
            if (file.size > maxSize) {
                showAlert('⚠️ ფაილი ძალიან დიდია (მაქსიმום 500MB)', 'error');
                return;
            }

            elements.uploadVideoBtn.disabled = true;
            elements.uploadVideoBtn.textContent = 'იტვირთება...';
            elements.progressContainer.classList.remove('hidden');
            showAlert('📤 ვიდეო იტვირთება...', 'info');

            try {
                const formData = new FormData();
                formData.append('video', file);
                formData.append('title', title);
                formData.append('description', description);

                // Simulate progress
                const progressInterval = setInterval(() => {
                    const currentWidth = parseFloat(elements.progressFill.style.width) || 0;
                    if (currentWidth < 90) {
                        elements.progressFill.style.width = (currentWidth + Math.random() * 20) + '%';
                    }
                }, 500);

                // Upload via backend API
                const response = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                elements.progressFill.style.width = '100%';

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Upload failed');
                }

                showAlert('✅ ვიდეო დაემატა წარმატებით!', 'success');
                
                elements.videoFile.value = '';
                elements.videoTitle.value = '';
                elements.videoDescription.value = '';
                document.querySelector('.file-input-label').textContent = '📁 ფაილის არჩევა';
                elements.progressContainer.classList.add('hidden');
                elements.progressFill.style.width = '0%';

                closeAllModals();
                await loadVideos();

            } catch (error) {
                console.error('Upload error:', error);
                showAlert(`❌ დაცდომა: ${error.message}`, 'error');
                elements.progressContainer.classList.add('hidden');
                elements.progressFill.style.width = '0%';
            } finally {
                elements.uploadVideoBtn.disabled = false;
                elements.uploadVideoBtn.textContent = 'ვიდეოს ატვირთვა';
            }
        });

        // ============================================
        // VIDEO LOADING & DISPLAY
        // ============================================
        async function loadVideos() {
            try {
                elements.videoGrid.innerHTML = '<div class="flex justify-center items-center col-span-full py-12"><div class="loading-spinner"></div></div>';

                const { data, error } = await supabaseClient
                    .from('videos')
                    .select('*')
                    .order('uploaded_at', { ascending: false });

                if (error) throw error;

                state.videos = data || [];

                if (state.videos.length === 0) {
                    elements.videoGrid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <p class="text-white text-xl">ვიდეოები არ არის. ${state.isAdminLoggedIn ? 'ატვირთეთ თქვენი პირველი ვიდეო!' : ''}</p>
                        </div>
                    `;
                    return;
                }

                elements.videoGrid.innerHTML = '';

                state.videos.forEach((video) => {
                    const videoCard = document.createElement('div');
                    videoCard.className = 'video-card cursor-pointer';
                    videoCard.innerHTML = `
                        <div class="video-thumbnail">▶️</div>
                        <div class="p-4">
                            <h3 class="font-bold text-gray-800 truncate">${video.title || 'სახელი არ არის'}</h3>
                            <p class="text-gray-600 text-sm line-clamp-2">${video.description || 'აღწერა არ არის'}</p>
                            <p class="text-gray-400 text-xs mt-2">${new Date(video.uploaded_at).toLocaleDateString('ka-GE')}</p>
                        </div>
                    `;

                    videoCard.addEventListener('click', () => playVideo(video));
                    elements.videoGrid.appendChild(videoCard);
                });

            } catch (error) {
                console.error('Load videos error:', error);
                elements.videoGrid.innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <p class="text-white text-lg">❌ ხარვეზი: ${error.message}</p>
                    </div>
                `;
            }
        }

        function playVideo(video) {
            elements.playerTitle.textContent = video.title || 'სახელი არ არის';
            elements.playerDescription.textContent = video.description || 'აღწერა არ არის';
            elements.videoPlayer.src = video.file_path;
            elements.videoPlayerModal.classList.add('active');
            elements.videoPlayer.focus();
        }

        // ============================================
        // INITIALIZE ON PAGE LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadVideos();
            showAlert('🌙 მოგესალმებთ Moon Studio-ში!', 'info');
        });
    </script>
</body>
</html>
